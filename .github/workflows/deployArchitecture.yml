name: "Bicep Deploy Resources"

on:
  push:
    branches: [ mainnowayjose ]
    paths:
      - 'iac/**'
  workflow_dispatch:

env: 
  CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }} 
  TEMPLATE: 'iac/deployAll.bicep'
  PARAMETERS: 'iac/deployAll.bicepparam'  
  DEPLOYMENT_NAME: 'ACW_ProtectingYourApplicationSecrets'
  REGION: 'centralus'
  
permissions:
  id-token: write
  contents: read

jobs:
  deploy-architecture:
    name: Deploy Architecture
    runs-on: ubuntu-latest
    environment:
      name: 'dev'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deployment
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          name: '${{env.DEPLOYMENT_NAME}}-${{github.run_number}}'
          location: ${{ env.REGION }}
          scope: subscription
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template-file: '${{ env.TEMPLATE }}'
          parameters-file: '${{ env.PARAMETERS }}'
